name: Java CI with Maven

on:
  # Run CI on Pushes to "main"" or on pull requests targeting "main".
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  rat:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        with:
          path: ~/.m2/repository
          key: rat-maven-${{ hashFiles('**/pom.xml') }}
      - name: Set up JDK ${{ matrix.java }}
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          distribution: adopt
          java-version: 17
      - name: Build with Maven
        run: mvn -B --no-transfer-progress -Prat -DskipTests verify -Dskip.format.code=false

  build:
    needs: rat
    runs-on: ${{ matrix.os }}
    continue-on-error: ${{ matrix.experimental }}
    strategy:
      matrix:
        os: [ubuntu-latest]
        java: [ 17 ]
        experimental: [false]
    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
    - uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
      with:
        path: ~/.m2/repository
        key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
        restore-keys: |
          ${{ runner.os }}-maven-
    - name: Set up JDK ${{ matrix.java }}
      uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
      with:
        distribution: adopt
        java-version: ${{ matrix.java }}
    - name: Build with Maven
      run: mvn -B --no-transfer-progress package --file pom.xml -DCI_ENV=true verify
